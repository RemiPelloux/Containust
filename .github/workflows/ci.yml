name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --locked

  msrv:
    name: Minimum Rust 1.88
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install minimum Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --locked

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked

  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  # Cross-platform: macOS
  macos-ci:
    name: macOS CI
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --locked
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked

  # Cross-platform: Windows
  windows-ci:
    name: Windows CI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --locked
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked

  # QEMU smoke on macOS (HVF). Downloads pinned Alpine assets on first run.
  qemu-smoke-macos:
    name: QEMU smoke (macOS)
    runs-on: macos-latest
    needs: [macos-ci]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - name: Install QEMU
        run: brew install qemu
      - name: Cache VM boot assets
        uses: actions/cache@v4
        with:
          path: ~/.containust/cache/vm
          key: vm-assets-${{ runner.os }}-${{ runner.arch }}-v1
      - name: Build ctst
        run: cargo build -p containust-cli --locked --release
      - name: VM start / stop smoke
        run: |
          set -euo pipefail
          BIN=./target/release/ctst
          "$BIN" vm start
          "$BIN" vm start
          "$BIN" vm stop
          "$BIN" vm stop
          test ! -f "$HOME/.containust/cache/vm/qemu.pid.json"
