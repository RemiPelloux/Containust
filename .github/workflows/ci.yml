name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --locked

  msrv:
    name: Minimum Rust 1.88
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install minimum Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --locked

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked

  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required docs present
        run: |
          set -euo pipefail
          for path in \
            README.md \
            CHANGELOG.md \
            docs/VERSIONING.md \
            docs/PACKAGING.md \
            docs/RUNBOOKS.md \
            docs/PERFORMANCE.md \
            docs/FEATURE_FREEZE.md \
            docs/BETA_RC.md \
            docs/SUPPORT_POLICY.md \
            docs/GA_CHECKLIST.md \
            docs/CONTRIBUTING.md \
            docs/CLI_REFERENCE.md \
            docs/SDK_GUIDE.md \
            docs/THREAT_MODEL.md
          do
            test -s "${path}"
          done
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --document-private-items

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Library coverage (lcov)
        run: |
          cargo llvm-cov --workspace --lib --lcov --output-path lcov.info \
            --ignore-filename-regex '(/tests/|/target/)'
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov-info
          path: lcov.info

  # Cross-platform: macOS
  macos-ci:
    name: macOS CI
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --locked
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked

  # Cross-platform: Windows
  windows-ci:
    name: Windows CI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --locked
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked

  # Privileged Linux fixtures: namespaces, cgroups v2, mounts, capabilities,
  # and the sprint3 offline gate. GitHub ubuntu runners boot with cgroup v2
  # and allow passwordless sudo, so the #[ignore] suite runs as root here.
  privileged-linux:
    name: Privileged Linux
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - name: Install busybox
        run: sudo apt-get update && sudo apt-get install -y busybox-static
      - name: Build test binaries
        run: cargo test --workspace --locked --no-run
      - name: Privileged core fixtures (root)
        run: |
          sudo -E env "PATH=$PATH" \
            cargo test -p containust-core --locked -- --ignored --test-threads=1
      - name: Privileged offline gate (root)
        run: |
          sudo -E env "PATH=$PATH" \
            cargo test -p containust-cli --locked --test sprint3_gate -- --ignored --test-threads=1

  # QEMU smoke on macOS (HVF). Downloads pinned Alpine assets on first run.
  qemu-smoke-macos:
    name: QEMU smoke (macOS)
    runs-on: macos-latest
    needs: [macos-ci]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - name: Install QEMU
        run: brew install qemu
      - name: Cache VM boot assets
        uses: actions/cache@v4
        with:
          path: ~/.containust/cache/vm
          key: vm-assets-${{ runner.os }}-${{ runner.arch }}-v1
      - name: Build ctst
        run: cargo build -p containust-cli --locked --release
      - name: VM start / stop smoke
        env:
          # GitHub macOS runners lack HVF; force TCG and allow a long cold boot.
          CONTAINUST_QEMU_ACCEL: tcg
          CONTAINUST_VM_BOOT_TIMEOUT_SECS: "900"
        run: |
          set -euo pipefail
          BIN=./target/release/ctst
          "$BIN" vm start || {
            echo '==== qemu.stderr.log ===='; cat "$HOME/.containust/cache/vm/qemu.stderr.log" || true
            echo '==== qemu.serial.log (tail) ===='; tail -n 80 "$HOME/.containust/cache/vm/qemu.serial.log" || true
            exit 1
          }
          "$BIN" vm start
          "$BIN" vm stop
          "$BIN" vm stop
          test ! -f "$HOME/.containust/cache/vm/qemu.pid.json"
