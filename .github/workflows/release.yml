name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  # Required for cosign keyless (Sigstore OIDC) signing.
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ctst
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ctst
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ctst
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ctst
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: ctst.exe
    steps:
      - uses: actions/checkout@v4

      - name: Build metadata
        shell: bash
        run: |
          set -euo pipefail
          SHA="$(git rev-parse --short=12 HEAD)"
          EPOCH="$(git log -1 --format=%ct)"
          if date -u -d "@${EPOCH}" +%Y-%m-%d >/tmp/ctst-date 2>/dev/null; then
            DATE="$(cat /tmp/ctst-date)"
          else
            DATE="$(date -u -r "${EPOCH}" +%Y-%m-%d)"
          fi
          {
            echo "CONTAINUST_GIT_SHA=${SHA}"
            echo "CONTAINUST_BUILD_DATE=${DATE}"
            echo "SOURCE_DATE_EPOCH=${EPOCH}"
          } >> "${GITHUB_ENV}"
          printf '{"git_sha":"%s","built":"%s","source_date_epoch":"%s","target":"%s"}\n' \
            "${SHA}" "${DATE}" "${EPOCH}" "${{ matrix.target }}" > build-info.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} --package containust-cli
        env:
          CONTAINUST_GIT_SHA: ${{ env.CONTAINUST_GIT_SHA }}
          CONTAINUST_BUILD_DATE: ${{ env.CONTAINUST_BUILD_DATE }}
          SOURCE_DATE_EPOCH: ${{ env.SOURCE_DATE_EPOCH }}

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }} --package containust-cli
        env:
          CONTAINUST_GIT_SHA: ${{ env.CONTAINUST_GIT_SHA }}
          CONTAINUST_BUILD_DATE: ${{ env.CONTAINUST_BUILD_DATE }}
          SOURCE_DATE_EPOCH: ${{ env.SOURCE_DATE_EPOCH }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          STAGE="ctst-${{ matrix.target }}"
          mkdir -p "${STAGE}"
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "${STAGE}/"
          cp build-info.json "${STAGE}/"
          tar czf "${STAGE}.tar.gz" -C "${STAGE}" .
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = "ctst-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.artifact }}" $stage
          Copy-Item build-info.json $stage
          Compress-Archive -Path "$stage\*" -DestinationPath "$stage.zip"
          $hash = (Get-FileHash "$stage.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $stage.zip" | Out-File "$stage.zip.sha256" -Encoding ASCII

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctst-${{ matrix.target }}
          path: ctst-${{ matrix.target }}.*

  linux-packages:
    name: Linux packages (deb/rpm)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ctst-*-linux-gnu
          path: artifacts

      - name: Install nfpm
        run: |
          set -euo pipefail
          curl -sfL "https://github.com/goreleaser/nfpm/releases/download/v2.43.0/nfpm_2.43.0_Linux_x86_64.tar.gz" \
            | tar xz nfpm
          sudo install -m 755 nfpm /usr/local/bin/nfpm

      - name: Build .deb and .rpm packages
        run: |
          set -euo pipefail
          export NFPM_VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p packages
          for target in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            case "${target}" in
              x86_64-*) arch="amd64" ;;
              aarch64-*) arch="arm64" ;;
            esac
            workdir="$(mktemp -d)"
            tar xzf "artifacts/ctst-${target}/ctst-${target}.tar.gz" -C "${workdir}"
            export NFPM_ARCH="${arch}"
            export NFPM_BINARY="${workdir}/ctst"
            # nfpm does not expand env placeholders in the config; render it.
            envsubst '${NFPM_ARCH} ${NFPM_VERSION} ${NFPM_BINARY}' \
              < packaging/nfpm.yaml > "${workdir}/nfpm.yaml"
            nfpm package -f "${workdir}/nfpm.yaml" -p deb \
              -t "packages/ctst_${NFPM_VERSION}_${arch}.deb"
            nfpm package -f "${workdir}/nfpm.yaml" -p rpm \
              -t "packages/ctst-${NFPM_VERSION}-1.${arch}.rpm"
          done
          (cd packages && sha256sum ./* > SHA256SUMS.packages)

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ctst-linux-packages
          path: packages/*

  release:
    name: Create Release
    needs: [build, linux-packages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Verify checksum files
        run: |
          set -euo pipefail
          mapfile -t sums < <(find artifacts -name '*.sha256')
          test "${#sums[@]}" -ge 5
          for sum in "${sums[@]}"; do
            dir="$(dirname "${sum}")"
            (cd "${dir}" && sha256sum -c "$(basename "${sum}")")
          done

      - name: Aggregate checksums
        run: |
          set -euo pipefail
          find artifacts \( -name '*.sha256' -o -name 'SHA256SUMS.packages' \) \
            -exec cat {} + | sort -k2 > SHA256SUMS
          cat SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksum manifest (cosign keyless)
        run: |
          set -euo pipefail
          cosign sign-blob --yes SHA256SUMS \
            --bundle SHA256SUMS.sigstore.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Verify downloads with the accompanying `.sha256` files or the
            aggregated `SHA256SUMS` (signed keylessly with cosign —
            `SHA256SUMS.sigstore.json`; see `docs/RUNBOOKS.md` for the
            verification procedure).
            Each archive includes `build-info.json` (`git_sha`, `built`, `source_date_epoch`).
            Linux users can install the `.deb` / `.rpm` packages directly;
            see `docs/PACKAGING.md` for Homebrew and winget instructions.
          files: |
            artifacts/**/*
            SHA256SUMS
            SHA256SUMS.sigstore.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
