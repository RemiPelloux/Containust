# cargo-deny configuration for Containust
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = false
no-default-features = false

[advisories]
yanked = "deny"
ignore = []
git-fetch-with-cli = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "Zlib",
    "BSL-1.0",
    # Workspace crates: proprietary commercial license (see LICENSE).
    "LicenseRef-Containust-Commercial",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
skip = [
    # serde and modern proc-macro dependencies currently require different syn majors.
    { name = "syn", version = "3.0.0" },
    # ring's Windows support remains pinned to the 0.52 API while the CLI uses 0.61.
    { name = "windows-sys", version = "0.52.0" },
    # ring and the current tempfile/uuid stack use different getrandom APIs.
    { name = "getrandom", version = "0.2.17" },
    # petgraph and ratatui currently span three hashbrown generations.
    { name = "hashbrown", version = "0.15.5" },
    { name = "hashbrown", version = "0.16.1" },
    # hashbrown 0.15 retains the earlier foldhash API.
    { name = "foldhash", version = "0.1.5" },
    # aya still uses thiserror 1.x while the workspace has migrated to 2.x.
    { name = "thiserror", version = "1.0.69" },
    { name = "thiserror-impl", version = "1.0.69" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
